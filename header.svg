<svg viewBox="0 0 800 220" width="800" height="220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#000000" stroke-width="0.4" opacity="0.06"/>
    </pattern>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.5" fill="#0d1117" opacity="0.04"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="800" height="220" rx="12" fill="#f6f8fa"/>
  <rect width="800" height="220" rx="12" fill="url(#grid)"/>

  <!-- Accent bar top-left -->
  <rect x="0" y="0" width="4" height="220" rx="2" fill="#0d1117" opacity="0.7"/>

  <!-- Top label -->
  <text x="28" y="46" font-family="monospace" font-size="11" fill="#aaa" letter-spacing="2">// vishwaa_shah.profile</text>

  <!-- Blinking cursor accent -->
