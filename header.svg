  <text x="38" y="138" font-family="monospace" font-size="30" font-weight="bold" fill="#555" letter-spacing="-0.5">SWE  ·  Full-Stack  ·  AI Engineer</text>

  <!-- Divider -->
  <line x1="28" y1="160" x2="772" y2="160" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Status row -->
  <circle cx="38" cy="186" r="5" fill="#27c93f"/>
  <circle cx="38" cy="186" r="9" fill="#27c93f" opacity="0.15"/>
  <text x="56" y="191" font-family="monospace" font-size="12" fill="#666">Open to opportunities  ·  CS Grad @ UT Dallas  ·  Dallas, TX</text>

  <!-- Right-side tag stack -->
  <rect x="630" y="26" width="140" height="26" rx="6" fill="#0d1117" opacity="0.06"/>
  <text x="700" y="44" font-family="monospace" font-size="11" fill="#444" text-anchor="middle">Python · React · Node</text>

  <rect x="630" y="58" width="140" height="26" rx="6" fill="#0d1117" opacity="0.06"/>
  <text x="700" y="76" font-family="monospace" font-size="11" fill="#444" text-anchor="middle">LangChain · pgvector</text>

  <rect x="630" y="90" width="140" height="26" rx="6" fill="#0d1117" opacity="0.06"/>
  <text x="700" y="108" font-family="monospace" font-size="11" fill="#444" text-anchor="middle">Docker · PostgreSQL</text>

  <rect x="630" y="122" width="140" height="26" rx="6" fill="#0d1117" opacity="0.06"/>
  <text x="700" y="140" font-family="monospace" font-size="11" fill="#444" text-anchor="middle">AWS · GitHub Actions</text>
